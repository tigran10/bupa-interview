plugins {
    id 'java'
}

group = 'com.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    // JUnit for testing
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'

    // Optional: Logging libraries (e.g., SLF4J)
    implementation 'org.slf4j:slf4j-api:2.0.9'
    testRuntimeOnly 'org.slf4j:slf4j-simple:2.0.9'
}

tasks.test {
    useJUnitPlatform()
}